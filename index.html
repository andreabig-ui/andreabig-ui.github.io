<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#6d28d9">
<title>Selettore giochi Madonna di Campiglio 2026</title>
<style>
:root{color-scheme:light;--ink:#172033;--muted:#667085;--line:#d9dce5;--paper:#fff;--soft:#f5f3ff;--brand:#6d28d9;--brand2:#4c1d95;--safe:#eaf7ef}
*{box-sizing:border-box}
body{margin:0;background:#f4f5f8;color:var(--ink);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;line-height:1.45}
.site-header{background:linear-gradient(135deg,var(--brand2),var(--brand));color:#fff;padding:calc(22px + env(safe-area-inset-top)) 18px 22px}
.site-header__inner,#prisma-game-finder,.site-footer{width:min(100%,980px);margin:auto}
.site-header h1{font-size:clamp(1.45rem,5vw,2.2rem);line-height:1.1;margin:0 0 8px}
.site-header p{margin:0;opacity:.9}
#prisma-game-finder{padding:18px 14px 32px}
.viz-controls{display:grid;grid-template-columns:repeat(5,minmax(135px,1fr));gap:10px;background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:14px;box-shadow:0 5px 20px #18223012;position:sticky;top:8px;z-index:10}
.form-label{display:flex;flex-direction:column;gap:5px;font-size:.78rem;font-weight:750;color:#344054}
.form-select{width:100%;min-height:44px;border:1px solid #bfc4d1;border-radius:10px;background:#fff;color:var(--ink);font:inherit;padding:8px 30px 8px 10px}
.viz-row{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.pgf-result-line{padding:18px 4px 10px}
.text-muted{color:var(--muted)}
.text-small{font-size:.9rem}
.card{background:var(--paper);border:1px solid var(--line);border-radius:18px;box-shadow:0 5px 20px #18223010}
.pgf-summary{padding:18px;margin-bottom:14px;border-left:6px solid var(--brand)}
.viz-stat-value{font-size:1.45rem;font-weight:850;margin:3px 0 7px}
.pgf-summary p{margin:10px 0}
.viz-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:9px}
.btn.viz-tile{appearance:none;border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:13px;padding:13px;text-align:left;font:700 .96rem/1.25 system-ui;min-height:58px;cursor:pointer;box-shadow:0 2px 8px #1822300a}
.btn.viz-tile[aria-pressed="true"]{background:var(--soft);border:2px solid var(--brand);color:var(--brand2)}
.btn.viz-tile:focus-visible,.form-select:focus-visible{outline:3px solid #f59e0b;outline-offset:2px}
.pgf-empty{grid-column:1/-1;background:#fff7ed;border:1px solid #fed7aa;border-radius:13px;padding:16px}
.site-footer{padding:0 18px calc(24px + env(safe-area-inset-bottom));color:var(--muted);font-size:.8rem}
@media(max-width:760px){
 .viz-controls{grid-template-columns:repeat(2,minmax(0,1fr));position:static}
 .viz-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
}
@media(max-width:430px){
 #prisma-game-finder{padding:12px 10px 26px}
 .site-header{padding-left:14px;padding-right:14px}
 .viz-controls{gap:8px;padding:10px;border-radius:14px}
 .form-label:last-child{grid-column:1/-1}
 .viz-grid{grid-template-columns:1fr}
 .pgf-summary{padding:15px}
}
@media(prefers-reduced-motion:no-preference){.btn.viz-tile{transition:transform .12s ease,border-color .12s ease}.btn.viz-tile:active{transform:scale(.985)}}
</style>
</head>

  const controls = {
    env: root.querySelector("#pgf-env"),
    time: root.querySelector("#pgf-time"),
    intensity: root.querySelector("#pgf-intensity"),
    mode: root.querySelector("#pgf-mode"),
    status: root.querySelector("#pgf-status")
  };
  const grid = root.querySelector("#pgf-grid");
  const count = root.querySelector("#pgf-count");
  let selectedCode = null;

  function matches(game) {
    return (controls.env.value === "Tutti" || game.env.includes(controls.env.value)) &&
      (controls.time.value === "Tutti" || game.durationBand === controls.time.value) &&
      (controls.intensity.value === "Tutte" || game.intensity.toLowerCase().includes(controls.intensity.value.toLowerCase())) &&
      (controls.mode.value === "Tutti" || game.mode === controls.mode.value) &&
      (controls.status.value === "Tutti" || game.statusClass === controls.status.value);
  }

  function show(game) {
    selectedCode = game.code;
    root.querySelector("#pgf-summary-code").textContent = game.code + " · " + game.status;
    root.querySelector("#pgf-summary-name").textContent = game.name;
    root.querySelector("#pgf-summary-meta").textContent = game.space + " · " + game.duration + " min · intensità " + game.intensity + " · " + game.mode;
    root.querySelector("#pgf-summary-rules").textContent = game.rules;
    root.querySelector("#pgf-summary-scale").textContent = game.scale;
    root.querySelector("#pgf-summary-safety").textContent = game.safety;
    root.querySelector("#pgf-summary-materials").textContent = "Materiali: " + game.materials;
    grid.querySelectorAll("button").forEach((button) => button.setAttribute("aria-pressed", String(button.dataset.code === selectedCode)));
  }

  function render() {
    const filtered = games.filter(matches);
    count.textContent = filtered.length + (filtered.length === 1 ? " gioco compatibile" : " giochi compatibili");
    grid.replaceChildren();
    if (!filtered.length) {
      const empty = document.createElement("div");
      empty.className = "pgf-empty";
      empty.textContent = "Nessuna combinazione: allarga un filtro oppure scegli una versione da testare.";
      grid.appendChild(empty);
      return;
    }
    if (!filtered.some((game) => game.code === selectedCode)) show(filtered[0]);
    filtered.forEach((game) => {
      const button = document.createElement("button");
      button.type = "button";
      button.className = "btn viz-tile";
      button.dataset.code = game.code;
      button.textContent = game.name;
      button.setAttribute("aria-label", game.code + ": " + game.name);
      button.setAttribute("aria-pressed", String(game.code === selectedCode));
      button.addEventListener("click", () => show(game));
      grid.appendChild(button);
    });
  }

  Object.values(controls).forEach((control) => control.addEventListener("change", render));
  render();
})();
